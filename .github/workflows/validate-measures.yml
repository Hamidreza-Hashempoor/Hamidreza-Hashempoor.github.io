name: Validate dictionary data

# Stage-7 growth-loop gate: when a PR changes the dictionary data, validate the
# JSON so no broken/unreviewed entry reaches the live site. CI-only — this does
# not change how GitHub Pages serves the site.

on:
  pull_request:
    paths:
      - "blog/distances-dictionary/data/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate measures.json
        run: |
          python3 - <<'PY'
          import json, sys, re
          base = "blog/distances-dictionary/data"
          # Load every card file listed in the multi-file manifest (fallback: measures.json),
          # matching modules/data.js loadData and scripts/validate-cards.mjs so CI checks the
          # same card set the site serves.
          files = ["measures.json"]
          try:
              man = json.load(open(f"{base}/cards/manifest.json"))
              if isinstance(man.get("files"), list) and man["files"]: files = man["files"]
          except FileNotFoundError:
              pass
          M = []
          for cf in files:
              M.extend(json.load(open(f"{base}/{cf}")))
          A = json.load(open(f"{base}/aliases.json"))
          C = json.load(open(f"{base}/code_templates.json"))
          T = json.load(open(f"{base}/taxonomy.json"))
          KNOWN_KINDS = {k["id"] for k in T["kinds"]}
          KNOWN_DOMAINS = {d["id"] for d in T["domains"]}

          KNOWN_TYPES = {"scalar","vector","matrix","spd_matrix","probability_vector",
            "probability_density","probability_distribution","empirical_samples","function",
            "set","metric_space","graph","string","time_series","point_cloud","tensor","sequence"}
          KNOWN_PROPS = {"nonnegative","symmetric","bounded","metric","sqrt_metric","differentiable",
            "convex_in_first_argument","finite_requires_absolute_continuity","requires_same_support",
            "closed_form_gaussian"}

          # Phase 4 quality gate (peer of scripts/validate-cards.mjs). Deterministic checks only —
          # no katex in CI, so LaTeX uses the structural brace/$ balance (same as the mjs fallback).
          SLUG_RE = re.compile(r"^[a-z0-9]+([-_][a-z0-9]+)*$")
          REQUIRED_BY_KIND = {
            "measure": {"all": ["input_types"]},          # formula-or-code checked below
            "formula": {"all": ["formula_latex"]},
            "function": {"all": ["formula_latex"]},
            "distribution": {"all": ["formula_latex"]},
            "transform": {"all": ["formula_latex"]},
            "inequality": {"oneOf": [["formula_latex", "inequalities"]]},
          }
          def is_empty(v):
              return v is None or v == "" or (isinstance(v, (list, dict)) and len(v) == 0)
          def latex_balanced(s):
              if not isinstance(s, str) or not s.strip(): return False
              depth = 0; k = 0; n = len(s)
              while k < n:
                  c = s[k]
                  if c == "\\": k += 2; continue
                  if c == "{": depth += 1
                  elif c == "}":
                      depth -= 1
                      if depth < 0: return False
                  k += 1
              if depth != 0: return False
              return len(re.findall(r"\$", re.sub(r"\\\$", "", s))) % 2 == 0

          ids = {m.get("id") for m in M}
          errors, seen, names = [], set(), set()
          for m in M:
              i = m.get("id")
              if not i:
                  errors.append("entry with missing id"); continue
              if i in seen: errors.append(f"duplicate id: {i}")
              seen.add(i)
              nk = (m.get("canonical_name") or "").lower()
              if nk in names: errors.append(f"duplicate canonical name: {m.get('canonical_name')}")
              names.add(nk)
              # taxonomy: every card needs a known kind and >=1 known domain
              kind_id = m.get("kind")
              if not kind_id: errors.append(f"{i}: missing kind")
              elif kind_id not in KNOWN_KINDS: errors.append(f"{i}: unknown kind '{kind_id}'")
              dom = m.get("domain")
              if not isinstance(dom, list) or not dom: errors.append(f"{i}: missing domain")
              else:
                  for d in dom:
                      if d not in KNOWN_DOMAINS: errors.append(f"{i}: unknown domain '{d}'")
              for p in m.get("prerequisites", []):
                  if p not in ids: errors.append(f"{i}: prerequisites -> unknown id '{p}'")
              # Phase 4: slug id, >=1 titled reference, well-formed urls, kind-required fields, LaTeX balance
              if i and not SLUG_RE.match(i): errors.append(f"{i}: id is not a valid slug")
              refs = m.get("references") or []
              if not any(r and r.get("title") and str(r["title"]).strip() for r in refs):
                  errors.append(f"{i}: no reference with a non-empty title")
              for r in refs:
                  u = (r or {}).get("url")
                  if u and re.search(r"\s", u): errors.append(f"{i}: malformed reference url '{u}'")
              spec = REQUIRED_BY_KIND.get(kind_id, {})
              for f in spec.get("all", []):
                  if is_empty(m.get(f)): errors.append(f"{i}: kind '{kind_id}' requires '{f}'")
              for grp in spec.get("oneOf", []):
                  if all(is_empty(m.get(f)) for f in grp): errors.append(f"{i}: kind '{kind_id}' requires one of {grp}")
              for lx in [m.get("formula_latex")] + list(m.get("symbols", []) or []):
                  if lx and not latex_balanced(lx): errors.append(f"{i}: LaTeX not balanced: {str(lx)[:40]}")
              # measure-specific rules (future non-measure kinds aren't judged by them)
              if kind_id == "measure":
                  if not m.get("formula_latex") and not m.get("code_templates"):
                      errors.append(f"{i}: empty formula and no code templates")
                  for t in m.get("input_types", []):
                      if t not in KNOWN_TYPES: errors.append(f"{i}: unknown input type '{t}'")
                  for k in (m.get("properties") or {}):
                      if k not in KNOWN_PROPS: errors.append(f"{i}: unknown property '{k}'")
              for r in m.get("related", []):
                  if r not in ids: errors.append(f"{i}: related -> unknown id '{r}'")
              # Phase 3 relationship consistency: self-links, duplicates, relations[].to
              for field in ("related", "prerequisites"):
                  seen_edge = set()
                  for r in m.get(field, []):
                      if r == i: errors.append(f"{i}: {field} -> self-link")
                      if r in seen_edge: errors.append(f"{i}: {field} -> duplicate id '{r}'")
                      seen_edge.add(r)
              for e in m.get("relations", []):
                  to = (e or {}).get("to")
                  if not to: errors.append(f"{i}: relations entry missing 'to'")
                  elif to == i: errors.append(f"{i}: relations -> self-link")
                  elif to not in ids: errors.append(f"{i}: relations -> unknown id '{to}'")
              for t in m.get("code_templates", []):
                  tpl = C.get(i)
                  if not tpl or t not in tpl: errors.append(f"{i}: declared code template '{t}' not found")
              for kind in ("identities", "inequalities"):
                  for rel in m.get(kind, []):
                      lx = rel.get("latex")
                      if not lx: errors.append(f"{i}: {kind} entry missing latex")
                      elif not latex_balanced(lx): errors.append(f"{i}: {kind} LaTeX not balanced: {str(lx)[:40]}")
                      for r in rel.get("refs", []):
                          if r not in ids: errors.append(f"{i}: {kind} ref -> unknown id '{r}'")
          for term, target in A.items():
              if target not in ids: errors.append(f"alias '{term}' -> unknown id '{target}'")
          for cid in C:
              if cid not in ids: errors.append(f"code_templates has unknown measure id '{cid}'")

          # Phase 3: contradictory typed relations + prerequisite cycles (prereq graph must be a DAG)
          ANTISYM = {"generalizes", "specializes", "reduces_to"}
          typed = set()
          for m in M:
              for e in m.get("relations", []):
                  if e and e.get("to") and e.get("type") in ANTISYM:
                      typed.add((e["type"], m.get("id"), e["to"]))
          for (t, a, b) in typed:
              if a < b and (t, b, a) in typed:
                  errors.append(f"contradictory typed relation: {a} and {b} both '{t}' each other")
          prereqs = {m.get("id"): [p for p in m.get("prerequisites", []) if p in ids and p != m.get("id")] for m in M}
          color = {}
          def visit(x, stack):
              color[x] = 1
              for p in prereqs.get(x, []):
                  c = color.get(p, 0)
                  if c == 1: errors.append("prerequisite cycle: " + " -> ".join(stack + [x, p]))
                  elif c != 2: visit(p, stack + [x])
              color[x] = 2
          for x in list(prereqs):
              if color.get(x, 0) == 0: visit(x, [])

          print(f"measures={len(M)} families/aliases={len(A)} code-templated={len(C)}")
          if errors:
              print(f"\nFAILED with {len(errors)} error(s):")
              for e in errors: print("  -", e)
              sys.exit(1)
          print("OK: all dictionary data checks passed.")
          PY
